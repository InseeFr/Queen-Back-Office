name: Thou shall not pass !!! (Check version & run tests)

on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: install model filiere
        run: mvn install:install-file -Dfile="$(pwd)/libs/modelefiliere-3.0.0-rc.2.jar" -DgroupId=fr.insee -DartifactId=modelefiliere -Dversion=3.0.0-rc.2 -Dpackaging=jar -DgeneratePom=true

      - name: Running tests
        run: mvn test --no-transfer-progress

