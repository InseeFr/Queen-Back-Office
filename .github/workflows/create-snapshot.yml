name: Build snapshot

on:
  push:
    branches-ignore:
      - main

jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.extract_branch.outputs.branch }}
      clean_branch: ${{ steps.extract_branch.outputs.clean_branch }}
    steps:
      - name: Extract branch name
        shell: bash
        # create two outputs:
        # - branch: for checkout
        # - clean_branch: branch where '/' are replaced by '-' (for tagging docker image)
        run: |
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          echo "branch=$BRANCH_NAME" >>$GITHUB_OUTPUT
          echo "clean_branch=$(echo $BRANCH_NAME | tr '/' '-')" >>$GITHUB_OUTPUT
        id: extract_branch

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.extract_branch.outputs.branch }}

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: install model filiere
        run: mvn install:install-file -Dfile="$(pwd)/queen-listener-jms/libs/modelefiliere-1.1.2-SNAPSHOT.jar" -DgroupId=fr.insee -DartifactId=modelefiliere -Dversion=1.1.2-SNAPSHOT -Dpackaging=jar -DgeneratePom=true

      - name: Build API
        run: mvn package --no-transfer-progress

      - name: Upload API jar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-jar
          path: queen-application/target/*.jar

  docker:
    needs:
      - build-snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download uploaded jar
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: app-jar
          path: queen-application/target/

      - name: Publish to Docker Hub
        uses: elgohr/Publish-Docker-Github-Action@32b6623ebb46c5fe6dcfc2281cfcd549a31366ce # v5
        with:
          name: inseefr/queen-back-office
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          tags: "snapshot-${{ needs.build-snapshot.outputs.clean_branch }}"
          workdir: queen-application
